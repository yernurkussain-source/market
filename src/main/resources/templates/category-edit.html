<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Category — MyMarket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}" th:with="activePage='categories'"></div>

<div class="page narrow-page">
    <div class="page-header page-header-row">
        <div>
            <div class="page-title">Edit Category</div>
            <div class="page-subtitle">Update category information in a separate form.</div>
        </div>
        <a th:href="@{/ui/categories}" class="btn btn-secondary">← Back to categories</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card edit-card">
        <div class="card-header">
            <span class="card-title">Category #<span th:text="${category.id}"></span></span>
        </div>
        <div class="card-body">
            <form th:action="@{/ui/categories/update/{id}(id=${category.id})}" method="post">
                <div class="form-group stacked-field">
                    <label class="form-label">Category name</label>
                    <input class="form-control" type="text" name="name" th:value="${category.name}" required/>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save changes</button>
                    <a th:href="@{/ui/categories}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
