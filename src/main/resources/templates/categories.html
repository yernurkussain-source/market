<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Categories — MyMarket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a href="/ui/products" class="navbar-brand">MyMarket</a>
    <div class="navbar-links">
        <a th:href="@{/ui/products}">🛒 Products</a>
        <a th:href="@{/ui/categories}" class="active">📂 Categories</a>
        <a th:href="@{/ui/orders}">📦 Orders</a>
        <a th:href="@{/ui/users}">👤 Users</a>
    </div>
</nav>

<div class="page">
    <div class="page-header">
        <div class="page-title">Categories</div>
        <div class="page-subtitle">Manage product categories</div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Categories</div>
            <div class="stat-value" th:text="${#lists.size(categories)}">0</div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">➕ New Category</span>
        </div>
        <div class="card-body">
            <form th:action="@{/ui/categories/add}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Category Name</label>
                        <input class="form-control" type="text" name="name"
                               placeholder="e.g. Electronics" required/>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">➕ Add</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">📋 Category List</span>
        </div>

        <div th:if="${#lists.isEmpty(categories)}" class="empty-state">
            <div class="empty-state-icon">📂</div>
            <div class="empty-state-text">No categories found. Add one above!</div>
        </div>

        <div th:if="${!#lists.isEmpty(categories)}" class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Product Count</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat : ${categories}">
                    <td th:text="${cat.id}"/>
                    <td th:text="${cat.name}"/>
                    <td>
                            <span class="badge badge-success"
                                  th:text="${#lists.size(cat.products)} + ' products'"/>
                    </td>
                    <td>
                        <a th:href="@{/ui/categories/delete/{id}(id=${cat.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this?')">
                            🗑 Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
