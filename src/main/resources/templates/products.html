<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Products — MyMarket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a href="/ui/products" class="navbar-brand">MyMarket</a>
    <div class="navbar-links">
        <a th:href="@{/ui/products}" class="active">🛒 Products</a>
        <a th:href="@{/ui/categories}">📂 Categories</a>
        <a th:href="@{/ui/orders}">📦 Orders</a>
        <a th:href="@{/ui/users}">👤 Users</a>
    </div>
</nav>

<div class="page">
    <div class="page-header">
        <div class="page-title">Products</div>
        <div class="page-subtitle">Manage all products</div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Products</div>
            <div class="stat-value" th:text="${#lists.size(products)}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Categories</div>
            <div class="stat-value" th:text="${#lists.size(categories)}">0</div>
        </div>
    </div>

    <!-- Add form -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">➕ Add New Product</span>
        </div>
        <div class="card-body">
            <form th:action="@{/ui/products/add}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input class="form-control" type="text" name="name"
                               placeholder="e.g. iPhone 15" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Price (₸)</label>
                        <input class="form-control" type="number" name="price"
                               placeholder="e.g. 450000" step="0.01" min="0" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quantity</label>
                        <input class="form-control" type="number" name="quantity"
                               placeholder="e.g. 10" min="0" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select class="form-control" name="categoryId" required>
                            <option value="">— Select —</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"/>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">
                            ➕ Add
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">📋 Product List</span>
        </div>

        <div th:if="${#lists.isEmpty(products)}" class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-text">No products found. Add one above!</div>
        </div>

        <div th:if="${!#lists.isEmpty(products)}" class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}"/>
                    <td th:text="${product.name}"/>
                    <td>
                            <span class="price"
                                  th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₸'"/>
                    </td>
                    <td>
                            <span class="badge"
                                  th:classappend="${product.quantity > 5} ? 'badge-success' : (${product.quantity > 0} ? 'badge-warning' : 'badge-danger')"
                                  th:text="${product.quantity} + ' pcs'"/>
                    </td>
                    <td th:text="${product.category != null ? product.category.name : '—'}"/>
                    <td>
                        <a th:href="@{/ui/products/delete/{id}(id=${product.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this?')">
                            🗑 Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
