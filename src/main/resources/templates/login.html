<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Login — MyMarket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
        .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
        .auth-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; text-align: center; }
        .auth-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 28px; }
        .auth-form .form-group { margin-bottom: 16px; }
        .auth-btn { width: 100%; justify-content: center; padding: 12px; font-size: 15px; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary); }
        .auth-footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-title">MyMarket</div>
        <div class="auth-subtitle">Sign in to your account</div>

        <div th:if="${param.error}" class="alert alert-danger">❌ Invalid email or password</div>
        <div th:if="${param.logout}" class="alert alert-success">✅ You have been logged out successfully</div>

        <form th:action="@{/ui/login}" method="post" class="auth-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="username" placeholder="email@mail.com" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn btn-primary auth-btn">Login</button>
        </form>

        <div class="auth-footer">
            Do not have an account?
            <a th:href="@{/ui/register}">Create account</a>
        </div>
    </div>
</div>
</body>
</html>
