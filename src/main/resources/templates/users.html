<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Users — MyMarket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}" th:with="activePage='users'"></div>

<div class="page">
    <div class="page-header">
        <div class="page-title"> Users</div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total users</div>
            <div class="stat-value" th:text="${#lists.size(users)}">0</div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><span class="card-title">➕ Add new user</span></div>
        <div class="card-body">
            <form th:action="@{/ui/users/add}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Full name</label>
                        <input class="form-control" type="text" name="fullname" placeholder="e.g. John Smith" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" placeholder="email@mail.com" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" placeholder="minimum 4 characters" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <select class="form-control" name="role">
                            <option value="USER">USER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">Add user</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><span class="card-title">User list</span></div>

        <div th:if="${#lists.isEmpty(users)}" class="empty-state">
            <div class="empty-state-text">No users yet.</div>
        </div>

        <div th:if="${!#lists.isEmpty(users)}" class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Full name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td class="strong" th:text="${user.fullname}"></td>
                    <td th:text="${user.email}"></td>
                    <td><span class="badge" th:classappend="${user.role == 'ADMIN'} ? 'badge-warning' : 'badge-success'" th:text="${user.role}"></span></td>
                    <td>
                        <a th:href="@{/ui/users/delete/{id}(id=${user.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this user?')">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
