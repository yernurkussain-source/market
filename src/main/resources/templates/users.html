<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Users — MyMarket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a href="/ui/products" class="navbar-brand">MyMarket</a>
    <div class="navbar-links">
        <a th:href="@{/ui/products}">🛒 Products</a>
        <a th:href="@{/ui/categories}">📂 Categories</a>
        <a th:href="@{/ui/orders}">📦 Orders</a>
        <a th:href="@{/ui/users}" class="active">👤 Users</a>
    </div>
</nav>

<div class="page">
    <div class="page-header">
        <div class="page-title">Users</div>
        <div class="page-subtitle">Manage registered users</div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Users</div>
            <div class="stat-value" th:text="${#lists.size(users)}">0</div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">➕ New User</span>
        </div>
        <div class="card-body">
            <form th:action="@{/ui/users/add}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input class="form-control" type="text" name="fullname"
                               placeholder="e.g. John Doe" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email"
                               placeholder="e.g. john@mail.com" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password"
                               placeholder="min 4 characters" required/>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">➕ Add</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">📋 User List</span>
        </div>

        <div th:if="${#lists.isEmpty(users)}" class="empty-state">
            <div class="empty-state-icon">👤</div>
            <div class="empty-state-text">No users found. Add one above!</div>
        </div>

        <div th:if="${!#lists.isEmpty(users)}" class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"/>
                    <td th:text="${user.fullname}"/>
                    <td th:text="${user.email}"/>
                    <td>
                        <a th:href="@{/ui/users/delete/{id}(id=${user.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this?')">
                            🗑 Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
